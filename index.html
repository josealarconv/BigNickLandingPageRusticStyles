                          <i data-lucide="external-link" class="w-4 h-4 text-zinc-600"></i>
                        </a>
                        <a href="https://www.facebook.com/bignicksfortmyers" target="_blank" rel="noopener noreferrer" class="flex items-center gap-4 p-4 bg-zinc-800 border border-zinc-700 hover:border-zinc-500 transition group">
                          <i data-lucide="facebook" class="w-6 h-6 text-zinc-400 group-hover:text-blue-500 transition"></i>
                          <div class="flex-1">
                            <p class="font-bold text-white uppercase tracking-wider">Big Nick's BBQ</p>
                            <p class="text-xs text-zinc-400">${t[lang].fbPage}</p>
                          </div>
                          <i data-lucide="external-link" class="w-4 h-4 text-zinc-600"></i>
                        </a>
                      </div>
                    </div>
                  </div>
                </div>
            `;
        }

        // VENTANA FLOTANTE (Modal HTML estático que se inyecta oculto)
        function buildStaticModal() {
            return `
                <div id="item-modal" class="hidden fixed inset-0 z-50 items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onclick="closeModal()">
                  <div class="bg-zinc-900 border border-zinc-700 w-full max-w-sm overflow-y-auto shadow-2xl relative animate-modal max-h-[95vh]" onclick="event.stopPropagation()">
                    <button onclick="closeModal()" class="absolute top-3 right-3 z-20 bg-black/60 p-1.5 rounded-full text-white hover:bg-red-600 transition">
                      <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                    <div class="h-56 w-full relative border-b-2 border-red-700 flex-shrink-0">
                      <img id="modal-img" src="" alt="" class="w-full h-full object-cover" />
                      <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 via-zinc-900/40 to-transparent"></div>
                    </div>
                    <div class="p-6 relative -mt-8 z-10">
                      <h3 id="modal-title" class="text-2xl font-black text-white uppercase tracking-wider mb-2 leading-tight drop-shadow-md">
                      </h3>
                      <div id="modal-desc"></div>
                      <div id="modal-prices" class="space-y-3 mb-6"></div>
                      <button id="modal-back-btn" onclick="closeModal()" class="w-full bg-zinc-800 text-white py-3 font-black uppercase tracking-widest border border-zinc-700 hover:bg-zinc-700 transition">
                      </button>
                    </div>
                  </div>
                </div>
            `;
        }

        // --- LA BARRA INFERIOR ---
        function buildBottomNav() {
            const navItems = [
                { id: 'home', icon: 'home', text: { en: 'Home', es: 'Inicio' } },
                { id: 'menu', icon: 'utensils', text: { en: 'Menu', es: 'Menú' } },
                { id: 'about', icon: 'flame', text: { en: 'Story', es: 'Historia' } },
                { id: 'catering', icon: 'truck', text: { en: 'Cater', es: 'Eventos' } },
                { id: 'social', icon: 'map-pin', text: { en: 'Info', es: 'Info' } }
            ];

            const buttonsHtml = navItems.map(item => {
                const isActive = currentView === item.id;
                // Colores si está activo o inactivo
                const activeTextColor = isActive ? 'text-red-500' : 'text-zinc-500';
                
                return `
                    <button type="button" onclick="setView('${item.id}')" class="w-full h-full flex flex-col items-center justify-center pt-2 pb-1 transition-transform active:scale-95 cursor-pointer touch-manipulation">
                        <i data-lucide="${item.icon}" class="w-6 h-6 mb-1 ${activeTextColor}"></i>
                        <span class="text-[9px] font-black uppercase tracking-wider ${activeTextColor}">${item.text[lang]}</span>
                        <div class="h-1 w-1 rounded-full mt-1 ${isActive ? 'bg-red-500' : 'bg-transparent'}"></div>
                    </button>
                `;
            }).join('');

            return `
                <nav class="flex-shrink-0 w-full bg-zinc-950 border-t border-zinc-900 pb-safe z-50 relative shadow-[0_-5px_20px_rgba(0,0,0,0.5)]">
                    <div class="grid grid-cols-5 h-16 w-full">
                        ${buttonsHtml}
                    </div>
                </nav>
            `;
        }

        // --- MAIN RENDER FUNCTION ---
        function render() {
            const root = document.getElementById('root');
            let content = '';

            // Generar el contenido según la vista actual
            switch (currentView) {
                case 'home': content = buildHomeView(); break;
                case 'about': content = buildAboutView(); break;
                case 'menu': content = buildMenuView(); break;
                case 'catering': content = buildCateringView(); break;
                case 'social': content = buildSocialView(); break;
            }

            const currentYear = new Date().getFullYear();

            // Aquí construimos el "Cascarón" fijo de la App
            root.innerHTML = `
                <div class="w-full max-w-md bg-zinc-950 shadow-2xl relative flex flex-col h-[100dvh] mx-auto overflow-hidden border-x border-zinc-900">
                  
                  <!-- ENCABEZADO FIJO -->
                  <div class="flex-shrink-0 sticky top-0 bg-zinc-950 shadow-md border-b-2 border-red-700 z-30 px-4 py-4 flex items-center justify-between">
                    <div class="flex items-center flex-1 overflow-hidden pr-2">
                      ${currentView !== 'home' ? `
                      <button onclick="setView('home')" class="p-2 -ml-2 rounded hover:bg-zinc-800 text-zinc-100 transition active:scale-90 mr-1 flex-shrink-0">
                        <i data-lucide="chevron-left" class="w-7 h-7"></i>
                      </button>
                      ` : ''}
                      <h1 class="text-xl font-black text-zinc-100 tracking-widest uppercase truncate">${getHeaderTitle()}</h1>
                    </div>
                    <div class="flex bg-zinc-900 border border-zinc-700 rounded-full overflow-hidden shadow-inner flex-shrink-0">
                      <button onclick="setLanguage('en')" class="px-2 py-1 text-[10px] font-black tracking-widest transition ${lang === 'en' ? 'bg-red-700 text-white' : 'text-zinc-500'}">EN</button>
                      <button onclick="setLanguage('es')" class="px-2 py-1 text-[10px] font-black tracking-widest transition ${lang === 'es' ? 'bg-amber-600 text-zinc-900' : 'text-zinc-500'}">ES</button>
                    </div>
                  </div>

                  <!-- CONTENIDO DESLIZABLE (Donde ocurre la magia) -->
                  <div class="flex-1 overflow-y-auto scroll-smooth hide-scrollbar bg-zinc-900" id="main-scroll">
                    ${content}
                    
                    <!-- Pie de página legal -->
                    <div class="w-full bg-zinc-950 py-6 border-t border-zinc-900 flex justify-center items-center">
                      <p class="text-zinc-600 text-[10px] uppercase tracking-widest font-bold text-center">
                        &copy; ${currentYear} Big Nick's BBQ.<br />${t[lang].rights}
                      </p>
                    </div>
                  </div>
                  
                  <!-- BARRA DE NAVEGACIÓN INFERIOR TIPO APP -->
                  ${buildBottomNav()}

                </div>
                <!-- Renderiza el Modal Estático de forma oculta -->
                ${buildStaticModal()}
            `;

            // Re-inicializa los íconos
            lucide.createIcons();
        }

        // Inicializar la aplicación al cargar
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });

    </script>
</body>
</html>
