        function buildModal() {
            if (!selectedItem) return '';

            const pricesHtml = selectedItem.prices.map((price, idx) => {
                let label = selectedItem.columns ? selectedItem.columns[lang][idx] : 'Price / Precio';
                label = label.replace('[', '').replace(']', ''); 
                return `
                    <div class="flex justify-between items-center bg-zinc-950 p-3 border border-zinc-800">
                      <span class="text-zinc-500 font-bold uppercase tracking-widest text-xs pr-4 whitespace-pre-line">
                        ${label}
                      </span>
                      <span class="text-red-500 font-black text-xl">${price}</span>
                    </div>
                `;
            }).join('');

            const descHtml = selectedItem.desc ? `<p class="text-zinc-300 text-sm mb-6 leading-relaxed font-medium">${selectedItem.desc[lang]}</p>` : '';

            return `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onclick="closeModal()">
                  <div class="bg-zinc-900 border border-zinc-700 w-full max-w-sm overflow-y-auto shadow-2xl relative animate-modal max-h-[95vh]" onclick="event.stopPropagation()">
                    <button onclick="closeModal()" class="absolute top-3 right-3 z-20 bg-black/60 p-1.5 rounded-full text-white hover:bg-red-600 transition">

                      <img src="${selectedItem.displayImage}" alt="${selectedItem.name[lang]}" class="w-full h-full object-cover" />
                      <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 via-zinc-900/40 to-transparent"></div>
                    </div>
                    
                    <div class="p-6 relative -mt-8 z-10">
                      <h3 class="text-2xl font-black text-white uppercase tracking-wider mb-2 leading-tight drop-shadow-md">
                        ${selectedItem.name[lang]}
                      </h3>
                      
                      ${descHtml}

                      <div class="space-y-3 mb-6">
                        ${pricesHtml}
                      </div>

                      <button onclick="closeModal()" class="w-full bg-zinc-800 text-white py-3 font-black uppercase tracking-widest border border-zinc-700 hover:bg-zinc-700 transition">
                        ${t[lang].backToMenu}
                      </button>
                    </div>
                  </div>
                </div>
            `;
        }

        // --- MAIN RENDER FUNCTION ---
        function render() {
            const root = document.getElementById('root');
            let content = '';

            switch (currentView) {
                case 'home': content = buildHomeView(); break;
                case 'about': content = buildAboutView(); break;
                case 'menu': content = buildMenuView(); break;
                case 'catering': content = buildCateringView(); break;
                case 'social': content = buildSocialView(); break;
            }

            const currentYear = new Date().getFullYear();

            root.innerHTML = `
                <div class="w-full max-w-md bg-zinc-950 shadow-2xl relative overflow-x-hidden border-x border-zinc-900 flex flex-col min-h-screen mx-auto">
                  <div class="flex-1 flex flex-col w-full">
                    ${content}
                  </div>
                  
                  <!-- Legal Footer -->
                  <div class="w-full bg-zinc-950 py-6 border-t border-zinc-900 flex justify-center items-center mt-auto">
                    <p class="text-zinc-600 text-[10px] uppercase tracking-widest font-bold text-center">
                      &copy; ${currentYear} Big Nick's BBQ.<br />${t[lang].rights}
                    </p>
                  </div>
                </div>
                ${buildModal()}
            `;

            // Re-inicializa los íconos cada vez que se inyecta nuevo HTML
            lucide.createIcons();
        }

        // Inicializar la aplicación al cargar
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });

    </script>
