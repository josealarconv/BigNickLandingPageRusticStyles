          <div className="px-4 py-6 overflow-y-auto space-y-8">
            <div>
              <SectionTitle><MapPin className="inline mr-2 text-red-600" /> {t[lang].ourSpots}</SectionTitle>
              <div className="bg-zinc-800 p-5 border-t-4 border-red-700 shadow-xl mb-6 relative">
                 <div className="absolute top-0 right-0 bg-red-700 text-white text-[10px] font-black px-3 py-1 uppercase">{t[lang].est}</div>
                <h4 className="font-black text-2xl text-white mb-2 uppercase">Fort Myers</h4>
                <p className="text-zinc-300 text-sm mb-4">9211 Cypress Lake Drive<br/>Fort Myers, FL 33919</p>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-black flex justify-center w-full font-sans">
          <div className="w-full max-w-md bg-zinc-950 shadow-2xl relative border-x border-zinc-900 flex flex-col min-h-screen">
            <div className="flex-1 flex flex-col">
              {currentView === 'home' && <HomeView />}
              {currentView === 'about' && <AboutView />}
              {currentView === 'menu' && <MenuView />}
              {currentView === 'catering' && <CateringView />}
              {currentView === 'social' && <SocialView />}
            </div>
            <div className="w-full bg-zinc-950 py-6 border-t border-zinc-900 flex justify-center items-center mt-auto">
              <p className="text-zinc-600 text-[10px] uppercase font-bold text-center">
                © {new Date().getFullYear()} Big Nick's BBQ. {t[lang].rights}
              </p>
            </div>
          </div>
        </div>
      );
    }

    // Inicializar la aplicación en el DOM
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
